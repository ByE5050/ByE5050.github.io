<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人博客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        /* 顶部导航栏 */
        header {
            background: #222831;
            height: 60px;
            line-height: 60px;
            position: sticky;
            top: 0;
            z-index: 999;
        }
        .nav-wrap {
            width: 1080px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
        }
        .nav-list a {
            color: #cccccc;
            text-decoration: none;
            margin-left: 30px;
            font-size: 16px;
            transition: 0.3s;
        }
        .nav-list a:hover {
            color: #76ABAE;
        }
        .nav-list a.active {
            color: #76ABAE;
        }
        /* 主体容器 */
        .container {
            width: 1080px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .box {
            background: #f8f9fa;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 10px #ddd;
        }
        h1 {
            color: #222831;
            margin-bottom: 20px;
        }
        p {
            line-height: 1.8;
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
        }
        footer {
            text-align: center;
            margin-top: 80px;
            padding: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header>
        <div class="nav-wrap">
            <a href="index.html" class="logo">白益的小博客</a>
            <div class="nav-list">
                <a href="index.html" class="active">首页</a>
                <a href="about.html">个人介绍</a>
                <a href="oc.html">我的OC</a>
                <a href="contact.html">联系方式</a>
            </div>
        </div>
    </header>

    <!-- 主页内容 -->
    <div class="container">
        <div class="box">
            <h1>欢迎来到我的个人博客</h1>
            <p>这里用来存放我的日常随笔、OC设定、绘画作品与个人相关信息。</p>
            <p>你可以通过上方导航栏切换不同板块：</p>
            <p>1. 个人介绍：关于我本人、爱好与日常</p>
            <p>2. 我的OC：原创角色设定、人物故事、插画记录</p>
            <p>3. 联系方式：社交平台、约稿渠道、交流途径</p>
        </div>
    </div>

    <footer>
        © 2026 白益 | 静态博客 GitHub Pages
    </footer>
</body>
</html>
